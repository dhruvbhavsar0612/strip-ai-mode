name: Code review

on: [pull_request]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  eslint-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: ESLint review (inline PR comments)
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          eslint_flags: "."
