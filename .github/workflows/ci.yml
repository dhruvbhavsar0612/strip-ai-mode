name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Lint JavaScript
        run: npm run lint

      - name: Validate JSON (manifest + rules)
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('rules.json','utf8'))"
          echo "JSON OK"

      - name: Web-ext lint (informational)
        run: npm run validate
        continue-on-error: true
