<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <img src="../icons/icon48.png" alt="" class="logo" />
      <h1>No AI Overviews</h1>
    </header>

    <label class="row" for="toggle">
      <span class="row-label">Remove AI Overviews</span>
      <span class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </span>
    </label>

    <p class="help">
      Uses Google's Web results mode (<code>udm=14</code>) to strip AI Overviews
      from search results.
    </p>

    <footer>
      <a
        class="link"
        href="https://github.com/dhruvbhavsar0612/strip-ai-mode/issues/new/choose"
        target="_blank"
        rel="noopener"
        >Report an issue</a
      >
      <a
        class="link"
        href="https://github.com/dhruvbhavsar0612/strip-ai-mode"
        target="_blank"
        rel="noopener"
        >GitHub</a
      >
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
